<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEN | Gamer Profile</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
background:
radial-gradient(circle at top,#3b82f6 0%,transparent 30%),
radial-gradient(circle at bottom,#1d4ed8 0%,transparent 30%),
#020617;
padding:20px;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:100%;
max-width:900px;
}

.profile{
background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.1);
border-radius:30px;
overflow:hidden;
color:white;
box-shadow:0 0 50px rgba(0,0,0,.4);
}

.profile::before{
content:"";
display:block;
height:5px;
background:linear-gradient(90deg,#60a5fa,#2563eb,#1d4ed8);
}

.banner{
height:220px;
background:url('https://images.unsplash.com/photo-1511512578047-dfb367046420?w=1200') center/cover;
}

.content{
padding:30px;
margin-top:-90px;
}

.avatar{
width:180px;
height:180px;
border-radius:50%;
object-fit:cover;
display:block;
margin:auto;
border:5px solid rgba(255,255,255,.15);
box-shadow:
0 0 25px #3b82f6,
0 0 60px #2563eb;
}

h1{
text-align:center;
margin-top:20px;
font-size:55px;
letter-spacing:3px;
text-shadow:0 0 25px #3b82f6;
}

.bio{
text-align:center;
margin-top:10px;
opacity:.8;
font-size:17px;
}

.tabs{
display:flex;
justify-content:center;
gap:10px;
margin-top:30px;
flex-wrap:wrap;
}

button{
background:#2563eb;
border:none;
padding:12px 20px;
color:white;
border-radius:12px;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

button:hover{
transform:translateY(-3px);
}

.tab{
display:none;
margin-top:25px;
}

.card{
background:rgba(255,255,255,.05);
padding:15px 20px;
border-radius:15px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
}

.footer{
text-align:center;
margin-top:25px;
opacity:.6;
}

@media(max-width:600px){

h1{
font-size:40px;
}

.avatar{
width:140px;
height:140px;
}

.card{
font-size:14px;
}

}

</style>
</head>
<body>

<div class="container">

<div class="profile">

<div class="banner"></div>

<div class="content">

<img
class="avatar"
src="https://images.unsplash.com/photo-1542751371-adc38448a05e?w=500"
alt="Profile">

<h1>KEN</h1>

<p class="bio">
🎮 Roblox Player • Valorant Player • 13 Years Old
</p>

<div class="tabs">
<button onclick="showTab('profil')">👤 Profil</button>
<button onclick="showTab('gaming')">🎮 Gaming</button>
</div>

<div id="profil" class="tab">

<div class="card">
<span>Nama</span>
<span>Ken</span>
</div>

<div class="card">
<span>Umur</span>
<span>13</span>
</div>

<div class="card">
<span>Warna Favorit</span>
<span>Biru</span>
</div>

<div class="card">
<span>TikTok</span>
<span>@kenfartsalot</span>
</div>

</div>

<div id="gaming" class="tab">

<div class="card">
<span>Game Favorit</span>
<span>Roblox</span>
</div>

<div class="card">
<span>Game Kedua</span>
<span>Valorant</span>
</div>

<div class="card">
<span>Hobi</span>
<span>Gaming</span>
</div>

<div class="card">
<span>Status</span>
<span>🟢 Online</span>
</div>

</div>

<div class="footer">
Made By Ken 💙
</div>

</div>

</div>

</div>

<script>

function showTab(tab){

document.querySelectorAll('.tab').forEach(item=>{
item.style.display='none';
});

document.getElementById(tab).style.display='block';

}

showTab('profil');

</script>

</body>
</html>
