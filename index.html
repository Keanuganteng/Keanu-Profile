<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ken | Profile</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:900px;
}

.profile{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.1);
border-radius:25px;
padding:40px;
color:white;
box-shadow:0 0 30px rgba(0,0,0,.3);
}

.avatar{
width:160px;
height:160px;
border-radius:50%;
object-fit:cover;
display:block;
margin:auto;
border:4px solid rgba(255,255,255,.2);
box-shadow:0 0 40px rgba(59,130,246,.8);
}

h1{
text-align:center;
margin-top:20px;
font-size:40px;
}

.bio{
text-align:center;
opacity:.8;
margin-top:10px;
}

.tabs{
display:flex;
gap:10px;
justify-content:center;
margin-top:30px;
}

button{
padding:12px 20px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

button:hover{
transform:translateY(-3px);
}

.tab{
display:none;
margin-top:25px;
}

.card{
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:15px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
}

.footer{
text-align:center;
margin-top:25px;
opacity:.7;
}

</style>
</head>
<body>

<div class="container">

<div class="profile">

<img
class="avatar"
src="https://images.unsplash.com/photo-1542751371-adc38448a05e?w=500"
alt="Gaming Profile">

<h1>KEN</h1>

<p class="bio">
13 Years Old • Roblox Player • Valorant Player
</p>

<div class="tabs">
<button onclick="showTab('profil')">👤 Profil</button>
<button onclick="showTab('gaming')">🎮 Gaming</button>
</div>

<div id="profil" class="tab">

<div class="card">
<span>Nama</span>
<span>Ken</span>
</div>

<div class="card">
<span>Umur</span>
<span>13</span>
</div>

<div class="card">
<span>Warna Favorit</span>
<span>Biru</span>
</div>

<div class="card">
<span>TikTok</span>
<span>@kenfartsalot</span>
</div>

</div>

<div id="gaming" class="tab">

<div class="card">
<span>Game Favorit</span>
<span>Roblox</span>
</div>

<div class="card">
<span>Game Kedua</span>
<span>Valorant</span>
</div>

<div class="card">
<span>Hobi</span>
<span>Gaming 🎮</span>
</div>

<div class="card">
<span>Status</span>
<span>Online 😭</span>
</div>

</div>

<div class="footer">
Made by Ken 💙
</div>

</div>

</div>

<script>

function showTab(tab){

document.querySelectorAll('.tab').forEach(x=>{
x.style.display='none';
});

document.getElementById(tab).style.display='block';

}

showTab('profil');

</script>

</body>
</html>
